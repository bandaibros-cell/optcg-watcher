name: OP TCG Watcher

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay on free tier)
  workflow_dispatch:          # lets you run it manually from the Actions tab

# Allow the job to commit the updated state.json back to the repo
permissions:
  contents: write

concurrency:
  group: optcg-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TCG_API_KEY: ${{ secrets.TCG_API_KEY }}
        run: |
          [ -f config.yaml ] || cp config.example.yaml config.yaml
          python watcher.py

      - name: Persist state
        run: |
          git config user.name  "optcg-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
